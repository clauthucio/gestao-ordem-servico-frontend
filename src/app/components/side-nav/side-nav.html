<aside class="fixed left-0 top-0 bottom-0 w-64 z-50 bg-slate-100 border-r border-slate-200 flex flex-col h-full pt-4">
  <!-- Logo -->
  <div class="px-6 py-4 mb-6">
    <h1 class="text-xl font-black text-slate-800 tracking-tighter">{{ appTitle() }}</h1>
    <p class="text-xs font-medium text-slate-600 tracking-wide uppercase mt-1">{{ appSubtitle() }}</p>
  </div>

  <!-- Navigation -->
  <nav class="flex-1 px-2">
    @for (item of items(); track item.route) {
      <a 
        [routerLink]="item.route"
        routerLinkActive="text-slate-900 bg-slate-200 border-l-4 border-slate-600"
        class="group flex items-center px-4 py-3 mb-1 mx-2 rounded-md transition-all text-slate-500 hover:text-slate-700 hover:bg-slate-200/50"
      >
        <span class="material-symbols-outlined mr-3 text-xl">{{ item.icon }}</span>
        <span class="font-sans text-sm font-medium tracking-wide">{{ item.label }}</span>
      </a>
    }
  </nav>

  <!-- Footer Actions -->
  <div class="mt-auto pb-6 px-2">
    <button 
      class="w-full mb-6 py-3 px-4 bg-gradient-to-br from-primary to-primary-dim text-on-primary rounded-xl font-semibold text-sm shadow-md active:scale-95 transition-transform flex items-center justify-center gap-2"
      (click)="onNovaOS.emit()"
    >
      <span class="material-symbols-outlined">add</span>
      Nova Ordem de Serviço
    </button>
    
    <a 
      routerLink="/suporte"
      class="group flex items-center px-4 py-3 mx-2 rounded-md transition-all text-slate-500 hover:text-slate-700 hover:bg-slate-200/50"
    >
      <span class="material-symbols-outlined mr-3 text-xl">help_outline</span>
      <span class="font-sans text-sm font-medium tracking-wide">Suporte</span>
    </a>
  </div>
</aside>
